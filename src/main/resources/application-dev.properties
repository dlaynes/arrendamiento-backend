# Dev profile: H2 in-memory (no MySQL required)
spring.datasource.url=${DB_URL:jdbc:h2:mem:rentmanagerdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT
jwt.secret=${JWT_SECRET:rentmanager-jwt-secret-key-2024-change-in-production}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}