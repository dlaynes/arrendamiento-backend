spring.application.name=arrendamiento

# Database (MySQL for main app)
spring.datasource.url=jdbc:mysql://localhost:3306/rentmanagerdb?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=rentmanager-jwt-secret-key-2024-change-in-production
jwt.expiration-ms=86400000

# CORS (adjust origin for your frontend)
cors.allowed-origins=http://localhost:5173
