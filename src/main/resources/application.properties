spring.application.name=arrendamiento

# Database (PostgreSQL for main app)
spring.datasource.url=jdbc:postgresql://localhost:5432/rentmanagerdb
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT
jwt.secret=rentmanager-jwt-secret-key-2024-change-in-production
jwt.expiration-ms=86400000

# CORS (adjust origin for your frontend)
cors.allowed-origins=http://localhost:5173
